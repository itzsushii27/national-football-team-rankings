<!DOCTYPE html>
<html>
<head>
    <title>Alternative FIFA Ranking System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Alternative FIFA Ranking System</h1>

<p>
Lower score = better ranking.
This system uses recent performance, opponent strength,
match importance, and team history.
</p>

<h2>Formula</h2>

<p>
Updated Score = Previous Score × (1 - G/5)
+ Calculated Score × (G/5)
</p>

<h2>Ranking Calculator</h2>

<label>Previous Score:</label>
<input id="previous" type="number">

<br>

<label>Calculated Score:</label>
<input id="calculated" type="number">

<br>

<label>Games Played (0-5):</label>
<input id="games" type="number" min="0" max="5">

<br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script src="script.js"></script>

</body>
</html>
